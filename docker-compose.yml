services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parking_lots
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/parking_lots
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
      - HF_HOME=/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./model:/app/model:ro  # Mount custom trained model
      - hf_cache:/app/.cache/huggingface  # Persist HuggingFace downloads
      - ./debug:/app/debug  # Debug output images
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  hf_cache:  # Persist HuggingFace model downloads
