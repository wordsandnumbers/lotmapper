services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parking_lots
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    command: >
      sh -c "rabbitmq-plugins enable rabbitmq_stream rabbitmq_stream_management && rabbitmq-server"
    ports:
      - "127.0.0.1:5672:5672"    # AMQP
      - "127.0.0.1:5552:5552"    # Stream protocol
      - "127.0.0.1:15672:15672"  # management UI
    environment:
      RABBITMQ_DEFAULT_USER: parking
      RABBITMQ_DEFAULT_PASS: parking
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/parking_lots
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
      - HF_HOME=/app/.cache/huggingface
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - RABBITMQ_URL=amqp://parking:parking@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./model:/app/model:ro  # Mount custom trained model
      - hf_cache:/app/.cache/huggingface  # Persist HuggingFace downloads
      - ./debug:/app/debug  # Debug output images
      - tile_cache:/app/tile_cache  # Cached map tiles
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    command: python -m app.worker_main
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/parking_lots
      - RABBITMQ_URL=amqp://parking:parking@rabbitmq:5672/
      - HF_HOME=/app/.cache/huggingface
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./model:/app/model:ro
      - hf_cache:/app/.cache/huggingface
      - ./debug:/app/debug
      - tile_cache:/app/tile_cache

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  hf_cache:  # Persist HuggingFace model downloads
  tile_cache:  # Cached map tiles (avoid re-fetching from Google)
