name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract versions
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "SEMVER=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          build-args: |
            BUILD_SHA=${{ env.SHORT_SHA }}
            SEMVER=${{ env.SEMVER }}
          tags: |
            ghcr.io/wordsandnumbers/parking-lot-app/backend:latest
            ghcr.io/wordsandnumbers/parking-lot-app/backend:git-${{ env.SHORT_SHA }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            BUILD_SHA=${{ env.SHORT_SHA }}
            SEMVER=${{ env.SEMVER }}
          tags: |
            ghcr.io/wordsandnumbers/parking-lot-app/frontend:latest
            ghcr.io/wordsandnumbers/parking-lot-app/frontend:git-${{ env.SHORT_SHA }}

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: SHORT_SHA
          script: |
            set -e
            cd /opt/parking-lot-app

            git pull origin main

            # Pin the deployed version in .env
            if grep -q "^IMAGE_TAG=" .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=git-${SHORT_SHA}/" .env
            else
              echo "IMAGE_TAG=git-${SHORT_SHA}" >> .env
            fi

            # Log in to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull and restart app services (not db/rabbitmq/caddy)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend worker frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps backend worker frontend

            # Run migrations
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend alembic upgrade head
